name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Chrome for Puppeteer
        # `npm ci` runs puppeteer's postinstall which can leave a partial
        # ~/.cache/puppeteer (folder without binary). `puppeteer browsers
        # install` then exits early because the folder exists, poisoning
        # every subsequent run. Wipe the cache and reinstall explicitly,
        # then assert the binary actually landed.
        run: |
          set -ex
          rm -rf ~/.cache/puppeteer
          npx puppeteer browsers install chrome-headless-shell
          ls -la ~/.cache/puppeteer
          test -x "$(find ~/.cache/puppeteer/chrome-headless-shell -name chrome-headless-shell -type f | head -1)"

      - name: Run quality checks
        run: npm run quality

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: michaelfay/mermaid-mcp
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
