name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Chrome for Puppeteer
        # `npx puppeteer browsers install` is broken on this stack:
        # `extract-zip` 2.0.1 (transitive via @puppeteer/browsers 2.6.1)
        # silently stops after a couple of files on Node 24, then resolves
        # the install promise with success — leaving a folder without the
        # binary. Reproduce on macOS too, so it's not CI-specific. Bypass
        # the broken extractor: download the pinned build directly and
        # unzip with the system tool.
        run: |
          set -ex
          rm -rf ~/.cache/puppeteer
          BUILD_ID=$(node -p "require('puppeteer-core/internal/revisions.js').PUPPETEER_REVISIONS['chrome-headless-shell']")
          INSTALL_DIR="$HOME/.cache/puppeteer/chrome-headless-shell/linux-$BUILD_ID"
          mkdir -p "$INSTALL_DIR"
          curl -fsSL "https://storage.googleapis.com/chrome-for-testing-public/$BUILD_ID/linux64/chrome-headless-shell-linux64.zip" -o /tmp/chs.zip
          unzip -q /tmp/chs.zip -d "$INSTALL_DIR"
          rm /tmp/chs.zip
          test -x "$INSTALL_DIR/chrome-headless-shell-linux64/chrome-headless-shell"

      - name: Run quality checks
        run: npm run quality

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: michaelfay/mermaid-mcp
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
