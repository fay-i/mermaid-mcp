<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">fay-i/mermaid-mcp social preview</title>
  <desc id="desc">A dark terminal mockup showing an AI assistant calling the mermaid_to_svg MCP tool and receiving a durable diagram artifact.</desc>
  <defs>
    <filter id="window-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="terminal-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#172233" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    @font-face {
      font-family: "Source Code Pro";
      src: local("Source Code Pro");
    }
    .font { font-family: "Source Code Pro", Menlo, Consolas, monospace; letter-spacing: 0; }
    .chrome { fill: #8b949e; font-size: 18px; font-weight: 600; }
    .kicker { fill: #7dd3fc; font-size: 25px; font-weight: 700; }
    .title { fill: #f0f6fc; font-size: 47px; font-weight: 800; }
    .line { font-size: 24px; font-weight: 600; }
    .small { font-size: 20px; font-weight: 600; }
    .muted { fill: #8b949e; }
    .fg { fill: #e6edf3; }
    .prompt { fill: #7ee787; }
    .tool { fill: #d2a8ff; }
    .cyan { fill: #79c0ff; }
    .amber { fill: #f2cc60; }
    .pink { fill: #ff7b72; }
    .green { fill: #7ee787; }
  </style>

  <rect width="1280" height="640" fill="#060a13"/>
  <rect width="1280" height="640" fill="url(#terminal-grid)" opacity="0.55"/>
  <path d="M0 0H1280V640H0Z" fill="#060a13" opacity="0.4"/>

  <g filter="url(#window-shadow)">
    <rect x="54" y="42" width="1172" height="556" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <rect x="54" y="42" width="1172" height="54" rx="8" fill="#161b22"/>
    <path d="M54 88H1226" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="84" cy="69" r="7" fill="#ff5f57"/>
    <circle cx="108" cy="69" r="7" fill="#febc2e"/>
    <circle cx="132" cy="69" r="7" fill="#28c840"/>
    <text class="font chrome" x="640" y="75" text-anchor="middle">fay-i/mermaid-mcp - MCP assistant terminal</text>
    <rect x="988" y="56" width="194" height="26" rx="6" fill="#0d1117" stroke="#30363d"/>
    <text class="font chrome" x="1085" y="75" text-anchor="middle">Source Code Pro</text>
  </g>

  <g class="font" transform="translate(93 132)">
    <text class="kicker" x="0" y="0">github.com/fay-i/mermaid-mcp</text>

    <g transform="translate(0 76)">
      <text class="line" x="0" y="0">
        <tspan class="prompt">$</tspan><tspan class="fg"> codex mcp call </tspan><tspan class="tool">mermaid_to_svg</tspan>
      </text>
      <text class="line" x="0" y="42">
        <tspan class="cyan">assistant</tspan><tspan class="muted">:</tspan><tspan class="fg"> I need a durable architecture diagram. Calling the MCP tool...</tspan>
      </text>
      <text class="line" x="0" y="84">
        <tspan class="tool">tool</tspan><tspan class="muted">:</tspan><tspan class="fg"> mermaid_to_svg({ theme: </tspan><tspan class="amber">"dark"</tspan><tspan class="fg">, drop_shadow: </tspan><tspan class="green">true</tspan><tspan class="fg"> })</tspan>
      </text>
      <text class="line" x="0" y="126">
        <tspan class="muted">code</tspan><tspan class="fg">: </tspan><tspan class="amber">"flowchart LR  prompt --&gt; render --&gt; artifact"</tspan>
      </text>
    </g>

    <g transform="translate(0 264)">
      <rect x="0" y="-31" width="1086" height="132" rx="8" fill="#101820" stroke="#263241"/>
      <text class="line" x="24" y="0">
        <tspan class="green">result</tspan><tspan class="muted">:</tspan><tspan class="fg"> { ok: true, format: </tspan><tspan class="amber">"svg"</tspan><tspan class="fg"> }</tspan>
      </text>
      <text class="line" x="24" y="42">
        <tspan class="muted">artifact_url</tspan><tspan class="fg">: </tspan><tspan class="cyan">"file://.../diagram.svg"</tspan>
      </text>
      <text class="line" x="24" y="84">
        <tspan class="cyan">assistant</tspan><tspan class="muted">:</tspan><tspan class="fg"> Attached the rendered diagram. PDF + deck tools ready.</tspan>
      </text>
    </g>

    <g transform="translate(0 424)">
      <rect x="0" y="-31" width="1086" height="52" rx="8" fill="#0b1220" stroke="#263241"/>
      <text class="small" x="24" y="0">
        <tspan class="muted">tools:</tspan><tspan class="fg"> healthcheck  </tspan><tspan class="tool">mermaid_to_svg</tspan><tspan class="fg">  mermaid_to_pdf  mermaid_to_deck</tspan>
      </text>
    </g>
  </g>
</svg>
